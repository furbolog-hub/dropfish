<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071b2d" />
  <title>Игровой центр</title>
  <link rel="stylesheet" href="menu.css?v=1.45-test-complete" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="portal-shell">
    <header class="portal-header glass">
      <span class="eyebrow">Telegram Mini App • Browser</span>
      <div class="portal-title-row">
        <h1>Игровой центр</h1>
        <img class="portal-logo" src="./assets/menu/game-center-logo.png?v=1.45" alt="Логотип игрового центра" />
      </div>
      <p>Выберите игру</p>
    </header>
    <section class="games-grid" aria-label="Список игр">
      <a class="game-card game-card--active game-card--dropfish glass" href="./dropfish/">
        <span class="game-card-art" aria-hidden="true"></span><span class="game-card-shade" aria-hidden="true"></span>
        <span class="game-icon" aria-hidden="true">🎣</span>
        <span class="game-copy"><strong>DropFish</strong><small>Рыбалка, редкие уловы, погода, бонусы и опасности.</small></span>
        <span class="play-mark">Играть →</span>
      </a>
      <a class="game-card game-card--active game-card--agroclick glass" href="./agroclick/">
        <span class="game-card-art" aria-hidden="true"></span><span class="game-card-shade" aria-hidden="true"></span>
        <span class="game-icon" aria-hidden="true">🌾</span>
        <span class="game-copy"><strong>AgroClick</strong><small>Собирайте урожай, находите сундуки и защищайте поле от вредителей.</small></span>
        <span class="play-mark">Играть →</span>
      </a>
    </section>
  </main>
  <script>const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();}</script>
</body>
</html>
